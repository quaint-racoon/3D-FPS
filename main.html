<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS FPS Multiplayer Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; 
            background-color: white; transform: translate(-50%, -50%); 
            border-radius: 50%; mix-blend-mode: difference; z-index: 10;
        }
        
        #pointer-container {
            position: absolute; top: 50%; left: 50%; width: 160px; height: 160px;
            margin-left: -80px; margin-top: -80px; pointer-events: none; display: none;
            transition: transform 0.1s;
        }
        #enemy-pointer {
            position: absolute; top: 0; left: 50%; width: 0; height: 0; margin-left: -10px;
            border-left: 10px solid transparent; border-right: 10px solid transparent; 
            border-bottom: 15px solid rgba(255, 0, 0, 0.8);
        }

        #weapon-info {
            position: absolute; bottom: 20px; right: 20px;
            color: white; font-size: 24px; text-align: right; text-shadow: 2px 2px 0 #000;
        }
        #health-info {
            position: absolute; bottom: 20px; left: 20px;
            color: #4caf50; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 0 #000;
        }

        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: rgba(0,0,0,0.85); color: white; cursor: pointer; pointer-events: auto; z-index: 20;
        }
        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px 40px; margin: 20px 0;
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px;
        }
        .controls-grid div { font-size: 18px; }
        .key { color: #ffeb3b; font-weight: bold; }

        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(150, 0, 0, 0.8); display: none; flex-direction: column; 
            align-items: center; justify-content: center; color: white; font-family: sans-serif; z-index: 100; pointer-events: auto;
        }
        #respawn-btn {
            padding: 15px 30px; font-size: 24px; font-weight: bold;
            background: white; color: black; border: none; cursor: pointer; margin-top: 20px; border-radius: 5px;
        }
        #respawn-btn:hover { background: #ddd; }

        #invite-link-btn {
            background: #2196F3; color: white; border: none; padding: 10px 15px;
            font-size: 16px; cursor: pointer; border-radius: 4px; margin-top: 10px; transition: background 0.2s;
        }
        #invite-link-btn:hover { background: #0b7dda; }
        #copy-toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background-color: #4caf50; color: white; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none;
        }
        .damage-text {
            position: absolute; color: #ffeb3b; font-size: 28px; font-weight: bold;
            text-shadow: 2px 2px 0 #000; pointer-events: none; transition: all 0.5s ease-out; z-index: 50; transform: translate(-50%, -50%);
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="game-container"></div>
    <div id="copy-toast">Link Copied to Clipboard!</div>
    
    <div id="ui">
        <div id="pointer-container"><div id="enemy-pointer"></div></div>
        <div id="crosshair"></div>
        <div id="health-info">HP: <span id="hp-val">100</span></div>
        <div id="weapon-info">
            <div id="current-weapon">Pistol</div>
            <div style="font-size: 14px; margin-top: 5px;">Press 1, 2, 3 to switch</div>
        </div>
    </div>

    <div id="instructions">
        <h1 style="font-size: 40px; margin-bottom: 0px;">Click to Play</h1>
        <div class="controls-grid">
            <div><span class="key">W A S D</span> - Move</div>
            <div><span class="key">Mouse</span> - Look</div>
            <div><span class="key">Space</span> - Jump</div>
            <div><span class="key">Left Click</span> - Shoot</div>
            <div><span class="key">Shift</span> - Sprint</div>
            <div><span class="key">Right Click</span> - Sniper Zoom</div>
            <div><span class="key">C</span> - Crouch</div>
            <div><span class="key">1, 2, 3</span> - Switch Weapon</div>
        </div>
        <div id="invite-container" style="color: yellow; text-align: center; margin-top: 10px;"></div>
    </div>

    <div id="death-screen">
        <h1 style="font-size: 60px; margin: 0;">YOU DIED</h1>
        <button id="respawn-btn">RESPAWN</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 0, 750);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- 2. RESTORED LIGHTING & ENVIRONMENT ---
        // (This is what prevents the pitch-black void!)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(100, 100, 50);
        scene.add(dirLight);

        // Restored Floor
        const floorGeo = new THREE.PlaneGeometry(2000, 2000);
        floorGeo.rotateX(-Math.PI / 2);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x228B22 }); // Changed to Lambert to react to light
        scene.add(new THREE.Mesh(floorGeo, floorMat));

        // Base Box Material setup (Boxes are placed later by the network)
        const collisionBoxes = [];
        const boxGeo = new THREE.BoxGeometry(20, 30, 20);
        const boxMat = new THREE.MeshLambertMaterial({ color: 0x888888 });

        // --- 3. PLAYER STATE & SAFE SPAWN ---
        const NORMAL_HEIGHT = 15;
        const CROUCH_HEIGHT = 7;
        const MAP_SIZE = 250;
        
        let health = 100;
        let isDead = false;
        let canJump = false;
        let isSprinting = false;
        let isCrouching = false;
        let currentHeight = NORMAL_HEIGHT;
        
        const gravity = 250.0;
        const playerSize = new THREE.Vector3(5, 15, 5);

        function checkWallCollision(box3) {
            for (const wallBox of collisionBoxes) {
                if (box3.intersectsBox(wallBox)) return true;
            }
            return false;
        }

        function getSafeSpawnPosition() {
            const spawnPos = new THREE.Vector3();
            let isSafe = false;
            let attempts = 0;

            while (!isSafe && attempts < 100) {
                spawnPos.set(
                    (Math.random() * MAP_SIZE * 2) - MAP_SIZE,
                    NORMAL_HEIGHT,
                    (Math.random() * MAP_SIZE * 2) - MAP_SIZE
                );

                const testBox = new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(spawnPos.x, spawnPos.y - (NORMAL_HEIGHT/2), spawnPos.z), 
                    playerSize
                );

                if (!checkWallCollision(testBox)) {
                    isSafe = true;
                }
                attempts++;
            }
            return spawnPos;
        }

        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', (e) => { 
            if(e.target.id === 'invite-link-btn') return; 
            if(!isDead) controls.lock(); 
        });
        controls.addEventListener('lock', () => { instructions.style.display = 'none'; });
        controls.addEventListener('unlock', () => { if(!isDead) instructions.style.display = 'flex'; });
        scene.add(controls.getObject());

        const moveState = { forward: false, backward: false, left: false, right: false };
        
        document.addEventListener('keydown', (e) => {
            if(isDead) return;
            switch (e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'Space': 
                    if (canJump && !isCrouching) { velocity.y += 100; canJump = false; }
                    break;
                case 'ShiftLeft': case 'ShiftRight': isSprinting = true; break;
                case 'KeyC': isCrouching = true; break;
                case 'Digit1': equipWeapon(0); break;
                case 'Digit2': equipWeapon(1); break;
                case 'Digit3': equipWeapon(2); break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyD': moveState.right = false; break;
                case 'ShiftLeft': case 'ShiftRight': isSprinting = false; break;
                case 'KeyC': isCrouching = false; break;
            }
        });

        // --- 4. WEAPONS (.GLB LOADER) ---
        const gltfLoader = new GLTFLoader();
        const weaponGroup = new THREE.Group();
        camera.add(weaponGroup);
        let currentWeaponModel = null;
        let currentDamage = 20;

        // Custom weapon array implemented
        const weapons = [
            { name: "Pistol", filename: "blaster-a.glb", dmg: 20, scale: [0.5, 0.5, 0.5], pos: [0.5, -0.5, -1] },
            { name: "AK-47", filename: "blaster-d.glb", dmg: 15, scale: [1, 1, 1], pos: [0.5, -0.5, -1] },
            { name: "Sniper", filename: "blaster-f.glb", dmg: 80, scale: [1.2, 1.2, 1.2], pos: [0.5, -0.5, -1] }
        ];

        function equipWeapon(index) {
            const w = weapons[index];
            document.getElementById('current-weapon').innerText = w.name;
            currentDamage = w.dmg; // Fixes the -undefined issue
            weaponGroup.clear(); 

            gltfLoader.load(`models/${w.filename}`, (gltf) => {
                currentWeaponModel = gltf.scene;
                currentWeaponModel.scale.set(...w.scale);
                currentWeaponModel.position.set(...w.pos);
                weaponGroup.add(currentWeaponModel);
            }, undefined, (err) => console.error(err));
        }
        equipWeapon(0);

        // --- 5. MULTIPLAYER (PEERJS & HOST MAP SYNC) ---
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        const peer = new Peer(); 
        let netConn = null;

        const enemyGeo = new THREE.BoxGeometry(5, 15, 5);
        const enemyMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const enemyMesh = new THREE.Mesh(enemyGeo, enemyMat);
        enemyMesh.visible = false;
        scene.add(enemyMesh);

        if (!joinId) {
            // YOU ARE HOST
            const mapData = [];
            for (let i = 0; i < 60; i++) {
                const x = Math.floor(Math.random() * 20 - 10) * 30;
                const y = 15;
                const z = Math.floor(Math.random() * 20 - 10) * 30;
                mapData.push({ x, y, z });

                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(x, y, z);
                scene.add(box);
                collisionBoxes.push(new THREE.Box3().setFromObject(box));
            }
            
            // Spawn after map is built
            camera.position.copy(getSafeSpawnPosition());

            peer.on('open', (id) => {
                const link = `${window.location.href.split('?')[0]}?join=${id}`;
                document.getElementById('invite-container').innerHTML = `
                    <p style="margin-bottom: 5px;">Invite a friend to play!</p>
                    <button id="invite-link-btn">Copy Invite Link</button>
                `;
                document.getElementById('invite-link-btn').addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    navigator.clipboard.writeText(link).then(() => {
                        const toast = document.getElementById('copy-toast');
                        toast.style.opacity = '1';
                        e.target.style.background = '#4caf50';
                        setTimeout(() => { toast.style.opacity = '0'; e.target.style.background = '#2196F3'; }, 2000);
                    });
                });
            });

            peer.on('connection', (conn) => {
                netConn = conn;
                enemyMesh.visible = true;
                document.getElementById('invite-container').innerText = "Friend connected! Click anywhere to play.";
                netConn.on('open', () => { netConn.send({ type: 'map', data: mapData }); });
                setupNetwork();
            });

        } else {
            // YOU ARE CLIENT
            peer.on('open', () => {
                document.getElementById('invite-container').innerText = "Connecting to Host...";
                netConn = peer.connect(joinId);
                netConn.on('open', () => {
                    document.getElementById('invite-container').innerText = "Connected! Waiting for map data...";
                    enemyMesh.visible = true;
                    setupNetwork();
                });
            });
        }

        function setupNetwork() {
            netConn.on('data', (data) => {
                if (data.type === 'map') {
                    data.data.forEach(pos => {
                        const box = new THREE.Mesh(boxGeo, boxMat);
                        box.position.set(pos.x, pos.y, pos.z);
                        scene.add(box);
                        collisionBoxes.push(new THREE.Box3().setFromObject(box));
                    });
                    // Spawn after receiving map
                    camera.position.copy(getSafeSpawnPosition());
                    document.getElementById('invite-container').innerText = "Map loaded! Click to Play.";
                }

                if (data.type === 'position') {
                    enemyMesh.position.set(data.x, data.y, data.z);
                    enemyMesh.rotation.y = data.rotY;
                    enemyMesh.scale.y = data.crouched ? (CROUCH_HEIGHT / NORMAL_HEIGHT) : 1;
                }
                
                if (data.type === 'hit' && !isDead) {
                    health -= data.damage;
                    document.getElementById('hp-val').innerText = health;
                    
                    const flash = document.createElement('div');
                    flash.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.5);pointer-events:none;z-index:90;';
                    document.body.appendChild(flash);
                    setTimeout(() => flash.remove(), 100);

                    if (health <= 0) {
                        isDead = true;
                        controls.unlock();
                        document.getElementById('death-screen').style.display = 'flex';
                        netConn.send({ type: 'dead' });
                    }
                }
                if (data.type === 'dead') enemyMesh.visible = false;
                if (data.type === 'respawn') enemyMesh.visible = true;
            });
        }

        // --- 6. SHOOTING & RESPAWN ---
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0);

        function showDamageText(dmg) {
            const el = document.createElement('div');
            el.className = 'damage-text';
            el.innerText = `-${dmg}`;
            el.style.left = `${window.innerWidth / 2 + (Math.random() * 40 - 20)}px`;
            el.style.top = `${window.innerHeight / 2 - 20}px`;
            document.body.appendChild(el);
            setTimeout(() => { el.style.top = `${window.innerHeight / 2 - 80}px`; el.style.opacity = '0'; }, 50);
            setTimeout(() => el.remove(), 550);
        }

        document.addEventListener('mousedown', (e) => {
            if (isDead || !controls.isLocked) return;
            
            if (e.button === 0) { 
                if (currentWeaponModel) {
                    currentWeaponModel.position.z += 0.2; 
                    setTimeout(() => currentWeaponModel.position.z -= 0.2, 50);
                }
                
                raycaster.setFromCamera(centerScreen, camera);
                if (enemyMesh.visible && raycaster.intersectObject(enemyMesh).length > 0) {
                    showDamageText(currentDamage);
                    if (netConn && netConn.open) netConn.send({ type: 'hit', damage: currentDamage });
                }
            }
            if (e.button === 2 && document.getElementById('current-weapon').innerText === "Sniper") {
                camera.fov = 20; camera.updateProjectionMatrix();
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 2) { camera.fov = 75; camera.updateProjectionMatrix(); }
        });

        document.getElementById('respawn-btn').addEventListener('click', () => {
            health = 100;
            isDead = false;
            document.getElementById('hp-val').innerText = health;
            document.getElementById('death-screen').style.display = 'none';
            
            controls.getObject().position.copy(getSafeSpawnPosition());
            velocity.set(0,0,0);
            
            controls.lock();
            if (netConn && netConn.open) netConn.send({ type: 'respawn' });
        });

        // --- 7. GAME LOOP ---
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const pointer = document.getElementById('pointer-container');
            if (enemyMesh.visible && !isDead) {
                pointer.style.display = 'block';
                const localPos = enemyMesh.position.clone();
                camera.worldToLocal(localPos); 
                const angle = Math.atan2(localPos.x, -localPos.z);
                pointer.style.transform = `rotate(${angle}rad)`;
            } else {
                pointer.style.display = 'none';
            }

            if (controls.isLocked && !isDead) {
                const delta = clock.getDelta();

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= gravity * delta; 

                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize();

                let moveSpeed = 400.0;
                if (isCrouching) moveSpeed = 150.0;
                else if (isSprinting) moveSpeed = 700.0;

                if (moveState.forward || moveState.backward) velocity.z -= direction.z * moveSpeed * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * moveSpeed * delta;

                const camObj = controls.getObject();
                
                const targetHeight = isCrouching ? CROUCH_HEIGHT : NORMAL_HEIGHT;
                if (canJump) { 
                    currentHeight += (targetHeight - currentHeight) * 10 * delta;
                }

                const startPos = camObj.position.clone();

                controls.moveRight(-velocity.x * delta);
                let pBoxX = new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(camObj.position.x, camObj.position.y - (currentHeight/2), camObj.position.z), 
                    new THREE.Vector3(playerSize.x, currentHeight, playerSize.z)
                );
                if (checkWallCollision(pBoxX)) {
                    camObj.position.copy(startPos);
                    velocity.x = 0;
                }

                const afterXPos = camObj.position.clone();
                controls.moveForward(-velocity.z * delta);
                let pBoxZ = new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(camObj.position.x, camObj.position.y - (currentHeight/2), camObj.position.z), 
                    new THREE.Vector3(playerSize.x, currentHeight, playerSize.z)
                );
                if (checkWallCollision(pBoxZ)) {
                    camObj.position.copy(afterXPos);
                    velocity.z = 0;
                }

                camObj.position.y += (velocity.y * delta);
                if (camObj.position.y < currentHeight) {
                    velocity.y = 0;
                    camObj.position.y = currentHeight;
                    canJump = true;
                }

                if (netConn && netConn.open) {
                    netConn.send({
                        type: 'position',
                        x: camObj.position.x,
                        y: camObj.position.y - (currentHeight/2), 
                        z: camObj.position.z,
                        rotY: camera.rotation.y,
                        crouched: isCrouching
                    });
                }
            } else {
                clock.getDelta();
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
